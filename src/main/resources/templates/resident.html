<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Asukkaan tiedot</title>
</head>

<body>

    <h1>Asukkaan tiedot</h1>

    <p><a href="/resident/list">Takaisin listaan</a></p>

    <div th:if="${resident}">
        <p><strong>ID:</strong> <span th:text="${resident.id}"></span></p>
        <p><strong>Huoneisto:</strong> <span th:text="${resident.apartment.fullName}"></span></p>
        <p><strong>Nimi:</strong> <span th:text="${resident.firstName + ' ' + resident.lastName}"></span></p>
        <p><strong>Sähköposti:</strong> <span th:text="${resident.email}"></span></p>

        <p>
            <a th:href="@{'/resident/edit/' + ${resident.id}}">Muokkaa</a>
        </p>
    </div>

</body>

</html>
